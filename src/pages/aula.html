<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@300..700&family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles/style.css">
    <title>Aula - Vila dos Estudos</title>
</head>
<body>
    <header>
        <h1 class="logo">
            <span class="icone">📚</span> 
            <span class="texto">Vila</span> dos Estudos
        </h1>
        <nav>
            <a href="index.html" class="nav-link">Voltar para Home</a>
        </nav>
    </header>

    <main>
        <section id="carregando-aula">
            <h2>Carregando conhecimento...🧠</h2>
        </section>

        <section id="conteudo-completo" style="display: none;">
            <p id="tag-materia"></p>
            <h2 id="titulo-aula"></h2>
            <div id="corpo-aula"></div>
        </section>
    </main>
    
    <script>
        const temaSalvo = localStorage.getItem('tema_vila');
        if (temaSalvo && temaSalvo !== 'light') {
            document.documentElement.classList.add(`theme-${temaSalvo}`);
            // Usa documentElement para injetar na raiz e evitar piscar branco
        }
    </script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <script type="module" src="../scripts/aula.js"></script>
</body>
</html>
